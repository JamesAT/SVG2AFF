<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG to .aff - ArcCreate</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #141418;
            --card: #1c1c24;
            --accent: #7654ff;
            --accent-hover: #9175ff;
            --text-main: #e1e1e6;
            --text-dim: #888;
            --border: #2d2d35;
            --cyan: #00f2ff;
            --green: #00ff66;
        }

        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; user-select: none; }
        #studio-layout { display: flex; width: 100%; height: 100%; }
        .panel { background: var(--panel); display: flex; flex-direction: column; min-width: 200px; max-width: 600px; z-index: 10; }
        
        header { padding: 18px 20px; background: #111116; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 700; text-transform: uppercase; color: #fff; }
        .scroll-content { padding: 20px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }
        .viewport { flex: 1; background: #050507; position: relative; cursor: default; }
        
        .resizer { width: 4px; cursor: col-resize; background: var(--border); transition: background 0.2s; }
        .resizer:hover, .resizer.active { background: var(--accent); }

        .ctrl-card { background: var(--card); padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        label { display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; }
        
        .val-display { float: right; color: var(--accent); font-family: monospace; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        input[type="number"] { width: 100%; background: #000; color: #fff; border: 1px solid var(--border); padding: 8px; border-radius: 4px; font-family: monospace; box-sizing: border-box; }
        
        .checkbox-row { display: flex; gap: 15px; align-items: center; }
        .checkbox-row label { display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text-main); margin-bottom: 0; text-transform: none; font-size: 11px;}

        textarea { width: 100%; background: #000; color: var(--cyan); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: monospace; font-size: 11px; resize: none; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; transition: all 0.2s; }
        button:hover { background: var(--accent-hover); }
        button.secondary { background: #333; }
        canvas { display: block; }
        
        .ref-link { font-size: 11px; background: #111; padding: 10px; border-radius: 4px; border: 1px solid var(--border); color: var(--text-dim); }
        .ref-link a { color: var(--cyan); text-decoration: none; }
        
        .hint { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #666; background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 20px; pointer-events: none; border: 1px solid #333;}
    </style>
</head>
<body>

<div id="studio-layout">
    <aside class="panel" id="leftPanel" style="width: 280px;">
        <header>Settings</header>
        <div class="scroll-content">
            <div class="ctrl-card">
                <label>Base Timing (ms)</label>
                <input type="number" id="baseTime" value="1000">
            </div>

            <div class="ctrl-card">
                <div class="checkbox-row" style="margin-bottom: 8px;">
                    <label style="font-size: 10px; font-weight: bold; text-transform: uppercase; color: var(--text-dim);">Scale</label>
                    <label style="margin-left: auto;"><input type="checkbox" id="linkScale" checked> Link X/Y</label>
                </div>
                <label>Scale X <span class="val-display" id="v_scaleX">0.050</span></label>
                <input type="range" id="scaleX" min="0.000001" max="1.0" step="0.000001" value="0.05">
                <label style="margin-top: 10px;">Scale Y <span class="val-display" id="v_scaleY">0.050</span></label>
                <input type="range" id="scaleY" min="0.000001" max="1.0" step="0.000001" value="0.05">
            </div>

            <div class="ctrl-card">
                <label>Rotation <span class="val-display" id="v_rot">0</span>°</label>
                <input type="range" id="rotation" min="0" max="360" step="1" value="0">
            </div>

            <div class="ctrl-card">
                <label>Flip Axis</label>
                <div class="checkbox-row">
                    <label><input type="checkbox" id="flipX"> Horiz (X)</label>
                    <label><input type="checkbox" id="flipY"> Vert (Y)</label>
                </div>
            </div>

            <div class="ctrl-card">
                <label>X Offset <span class="val-display" id="v_offX">0.50</span></label>
                <input type="range" id="offsetX" min="-4" max="5" step="0.01" value="0.5">
            </div>

            <div class="ctrl-card">
                <label>Y Offset <span class="val-display" id="v_offY">0.50</span></label>
                <input type="range" id="offsetY" min="-3" max="5" step="0.01" value="0.5">
            </div>

            <div class="ctrl-card">
                <label>Complexity <span class="val-display" id="v_steps">60</span></label>
                <input type="range" id="steps" min="2" max="500" step="1" value="60">
            </div>
        </div>
    </aside>

    <div class="resizer" id="resizerLeft"></div>

    <main class="viewport" id="viewport">
        <canvas id="canvas"></canvas>
        <div class="hint">LEFT-CLICK: Move/Resize | RIGHT-CLICK: Pan Camera</div>
    </main>

    <div class="resizer" id="resizerRight"></div>

    <aside class="panel" id="rightPanel" style="width: 380px;">
        <header>SVG to .aff Output</header>
        <div class="scroll-content">
            <div class="ref-link">
                Need to create a path? Use <a href="https://yqnn.github.io/svg-path-editor/" target="_blank">SVG Path Editor</a>.
            </div>
            
            <input type="file" id="svgFile" accept=".svg" style="display:none">
            <button class="secondary" onclick="document.getElementById('svgFile').click()">📁 Import SVG File</button>
            
            <label>Input Path Data</label>
            <textarea id="svgInput" spellcheck="false" placeholder="Paste path strings here..."></textarea>

            <label>Arcaea .aff Output</label>
            <textarea id="affOutput" readonly style="flex-grow:1;"></textarea>
            
            <button onclick="copyAff()">📋 Copy Result</button>
        </div>
    </aside>
</div>

<svg style="display:none;"><path id="pathHelper"></path></svg>

<script>
    const viewport = document.getElementById('viewport');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const svgInput = document.getElementById('svgInput');
    const pathHelper = document.getElementById('pathHelper');
    const affOutput = document.getElementById('affOutput');
    
    // UI Elements
    const fileInput = document.getElementById('svgFile');
    const scaleXInput = document.getElementById('scaleX');
    const scaleYInput = document.getElementById('scaleY');
    const offsetXInput = document.getElementById('offsetX');
    const offsetYInput = document.getElementById('offsetY');
    const linkScale = document.getElementById('linkScale');
    const baseTimeInput = document.getElementById('baseTime');

    // App State
    let camera = { x: 0, y: 0, zoom: 60 };
    let interactMode = 'none'; 
    let lastMouse = { x: 0, y: 0 };
    let bbox = { x: 0, y: 0, w: 0, h: 0 };
    
    // Transformation State
    let startScaleX = 0, startScaleY = 0;
    let startDistX = 0, startDistY = 0;
    let startCx = 0, startCy = 0;
    const handleSize = 8;

    // Handles sidebar width adjustment
    function setupResizer(handle, target, isRight) {
        handle.addEventListener('mousedown', (e) => {
            handle.classList.add('active');
            const startX = e.clientX;
            const startWidth = target.offsetWidth;
            const onMouseMove = (moveE) => {
                const delta = isRight ? startX - moveE.clientX : moveE.clientX - startX;
                target.style.width = (startWidth + delta) + 'px';
                resizeCanvas();
            };
            const onMouseUp = () => {
                handle.classList.remove('active');
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            };
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });
    }
    setupResizer(document.getElementById('resizerLeft'), document.getElementById('leftPanel'), false);
    setupResizer(document.getElementById('resizerRight'), document.getElementById('rightPanel'), true);

    function resizeCanvas() {
        canvas.width = viewport.clientWidth;
        canvas.height = viewport.clientHeight;
        render();
    }

    // Coordinate conversion from Arcaea space to Screen space
    function toSc(ax, ay) {
        return {
            x: (canvas.width / 2) + camera.x + (ax * camera.zoom),
            y: (canvas.height / 2) + camera.y - (ay * camera.zoom)
        };
    }

    // Visual guide for the Arcaea playfield
    function drawGrid() {
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 1;
        for(let i=-5; i<=6; i++) {
            let v1 = toSc(i, -5), v2 = toSc(i, 6);
            ctx.beginPath(); ctx.moveTo(v1.x, v1.y); ctx.lineTo(v2.x, v2.y); ctx.stroke();
            let h1 = toSc(-5, i), h2 = toSc(6, i);
            ctx.beginPath(); ctx.moveTo(h1.x, h1.y); ctx.lineTo(h2.x, h2.y); ctx.stroke();
        }
        const p1 = toSc(-0.5, 1.0);
        const p2 = toSc(1.5, -0.2);
        ctx.strokeStyle = '#00ff66';
        ctx.lineWidth = 2;
        ctx.strokeRect(p1.x, p1.y, p2.x - p1.x, p2.y - p1.y);
        ctx.fillStyle = '#00ff66';
        ctx.font = '10px monospace';
        ctx.fillText("PLAYFIELD", p1.x + 5, p1.y + 15);
    }

    // Sync scaling inputs when Linked checkbox is active
    scaleXInput.addEventListener('input', () => { if(linkScale.checked) scaleYInput.value = scaleXInput.value; render(); });
    scaleYInput.addEventListener('input', () => { if(linkScale.checked) scaleXInput.value = scaleYInput.value; render(); });

    // Main drawing loop
    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrid();

        const sx = parseFloat(scaleXInput.value);
        const sy = parseFloat(scaleYInput.value);
        const r = parseFloat(document.getElementById('rotation').value) * Math.PI / 180;
        const ox = parseFloat(offsetXInput.value);
        const oy = parseFloat(offsetYInput.value);
        const steps = parseInt(document.getElementById('steps').value);
        const flipX = document.getElementById('flipX').checked;
        const flipY = document.getElementById('flipY').checked;
        const time = parseInt(baseTimeInput.value) || 1000;

        // Sync numeric UI displays
        document.getElementById('v_scaleX').innerText = sx.toFixed(6);
        document.getElementById('v_scaleY').innerText = sy.toFixed(6);
        document.getElementById('v_rot').innerText = (r * 180 / Math.PI).toFixed(0);
        document.getElementById('v_offX').innerText = ox.toFixed(2);
        document.getElementById('v_offY').innerText = oy.toFixed(2);
        document.getElementById('v_steps').innerText = steps;

        const subPaths = svgInput.value.split(/(?=[Mm])/g);
        let affLines = [];
        
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;

        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 2;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';

        // Render path components
        subPaths.forEach(pathStr => {
            if(!pathStr.trim()) return;
            try {
                pathHelper.setAttribute('d', pathStr);
                const len = pathHelper.getTotalLength();
                if(len === 0) return;

                let prevP = null;
                ctx.beginPath();
                for(let i=0; i <= steps; i++) {
                    const raw = pathHelper.getPointAtLength((i/steps) * len);
                    let nx = raw.x * sx;
                    let ny = raw.y * sy;
                    
                    if(flipX) nx *= -1;
                    if(flipY) ny *= -1;
                    
                    const rx = nx * Math.cos(r) - ny * Math.sin(r);
                    const ry = nx * Math.sin(r) + ny * Math.cos(r);
                    const fx = rx + ox, fy = -ry + oy;
                    const sc = toSc(fx, fy);

                    minX = Math.min(minX, sc.x); maxX = Math.max(maxX, sc.x);
                    minY = Math.min(minY, sc.y); maxY = Math.max(maxY, sc.y);

                    if(i === 0) ctx.moveTo(sc.x, sc.y);
                    else {
                        ctx.lineTo(sc.x, sc.y);
                        affLines.push(`arc(${time},${time},${prevP.x.toFixed(3)},${fx.toFixed(3)},s,${prevP.y.toFixed(3)},${fy.toFixed(3)},0,none,true);`);
                    }
                    prevP = {x: fx, y: fy};
                }
                ctx.stroke();
            } catch(err) {}
        });
        
        affOutput.value = affLines.join('\n');

        // Draw selection box around rendered shape
        if(minX !== Infinity) {
            minX -= 5; minY -= 5; maxX += 5; maxY += 5;
            bbox = { x: minX, y: minY, w: maxX - minX, h: maxY - minY };

            ctx.strokeStyle = 'rgba(118, 84, 255, 0.8)';
            ctx.setLineDash([4, 4]);
            ctx.lineWidth = 1;
            ctx.strokeRect(bbox.x, bbox.y, bbox.w, bbox.h);
            ctx.setLineDash([]);

            ctx.fillStyle = '#00f2ff';
            const hs = handleSize;
            const hsHalf = hs/2;
            [
                {x: bbox.x, y: bbox.y}, 
                {x: bbox.x + bbox.w, y: bbox.y},
                {x: bbox.x, y: bbox.y + bbox.h},
                {x: bbox.x + bbox.w, y: bbox.y + bbox.h}
            ].forEach(p => {
                ctx.fillRect(p.x - hsHalf, p.y - hsHalf, hs, hs);
            });
        } else {
            bbox = { x: 0, y: 0, w: 0, h: 0 };
        }
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function isOverHandle(pos) {
        const hsHalf = handleSize / 2 + 2;
        const corners = [
            {x: bbox.x, y: bbox.y}, {x: bbox.x + bbox.w, y: bbox.y},
            {x: bbox.x, y: bbox.y + bbox.h}, {x: bbox.x + bbox.w, y: bbox.y + bbox.h}
        ];
        return corners.some(c => pos.x >= c.x - hsHalf && pos.x <= c.x + hsHalf && pos.y >= c.y - hsHalf && pos.y <= c.y + hsHalf);
    }

    function isOverBox(pos) {
        return pos.x >= bbox.x && pos.x <= bbox.x + bbox.w && pos.y >= bbox.y && pos.y <= bbox.y + bbox.h;
    }

    // Mouse input listeners
    viewport.addEventListener('mousedown', e => {
        const pos = getMousePos(e);
        
        // Right click pans the viewport
        if(e.button === 2 || e.ctrlKey) {
            interactMode = 'pan';
            lastMouse = pos;
            return;
        }

        // Left click initiates transform
        if(e.button === 0 && bbox.w > 0) {
            if(isOverHandle(pos)) {
                interactMode = 'resize';
                lastMouse = pos;
                startScaleX = parseFloat(scaleXInput.value);
                startScaleY = parseFloat(scaleYInput.value);
                startCx = bbox.x + bbox.w/2;
                startCy = bbox.y + bbox.h/2;
                startDistX = Math.abs(pos.x - startCx) || 1; 
                startDistY = Math.abs(pos.y - startCy) || 1;
            } else if (isOverBox(pos)) {
                interactMode = 'move';
                lastMouse = pos;
            }
        }
    });

    window.addEventListener('mousemove', e => {
        const pos = getMousePos(e);
        
        if(interactMode === 'none') {
            if(bbox.w > 0 && isOverHandle(pos)) canvas.style.cursor = 'nwse-resize';
            else if(bbox.w > 0 && isOverBox(pos)) canvas.style.cursor = 'move';
            else canvas.style.cursor = 'crosshair';
        }

        if(interactMode === 'pan') {
            camera.x += (pos.x - lastMouse.x);
            camera.y += (pos.y - lastMouse.y);
            lastMouse = pos;
            render();
        } 
        else if(interactMode === 'move') {
            const dxScreen = pos.x - lastMouse.x;
            const dyScreen = pos.y - lastMouse.y;
            const dxArc = dxScreen / camera.zoom;
            const dyArc = -(dyScreen / camera.zoom); 

            offsetXInput.value = (parseFloat(offsetXInput.value) + dxArc).toFixed(3);
            offsetYInput.value = (parseFloat(offsetYInput.value) + dyArc).toFixed(3);
            lastMouse = pos;
            render();
        }
        else if(interactMode === 'resize') {
            const currentDistX = Math.abs(pos.x - startCx);
            const currentDistY = Math.abs(pos.y - startCy);
            
            let newScaleX = startScaleX * (currentDistX / startDistX);
            let newScaleY = startScaleY * (currentDistY / startDistY);

            newScaleX = Math.max(0.000001, newScaleX);
            newScaleY = Math.max(0.000001, newScaleY);

            if(linkScale.checked) {
                const ratioX = currentDistX / startDistX;
                const ratioY = currentDistY / startDistY;
                const bestRatio = Math.max(ratioX, ratioY);
                scaleXInput.value = (startScaleX * bestRatio).toFixed(6);
                scaleYInput.value = (startScaleY * bestRatio).toFixed(6);
            } else {
                scaleXInput.value = newScaleX.toFixed(6);
                scaleYInput.value = newScaleY.toFixed(6);
            }
            render();
        }
    });

    window.addEventListener('mouseup', () => { interactMode = 'none'; canvas.style.cursor = 'crosshair'; });
    viewport.addEventListener('contextmenu', e => e.preventDefault());
    
    viewport.addEventListener('wheel', e => { 
        e.preventDefault(); 
        camera.zoom *= (e.deltaY < 0 ? 1.1 : 0.9); 
        render(); 
    }, {passive: false});

    window.addEventListener('resize', resizeCanvas);

    document.querySelectorAll('input, textarea').forEach(el => {
        if(el.id !== 'scaleX' && el.id !== 'scaleY') el.addEventListener('input', render);
    });

    fileInput.onchange = e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(ev.target.result, "image/svg+xml");
            const paths = Array.from(doc.querySelectorAll('path')).map(p => p.getAttribute('d')).filter(d => d).join(' ');
            svgInput.value = paths;
            render();
        };
        reader.readAsText(file);
    };

    function copyAff() {
        affOutput.select();
        document.execCommand('copy');
        const btn = document.querySelector('button[onclick="copyAff()"]');
        btn.innerText = "✅ Copied!";
        setTimeout(() => btn.innerText = "📋 Copy Result", 1500);
    }

    resizeCanvas();
</script>
</body>
</html>
